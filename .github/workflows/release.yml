name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

env:
  JAVA_VERSION: "17"

jobs:
  build-and-publish:
    name: Build signed APKs & publish
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}

      - uses: gradle/actions/setup-gradle@v4

      - name: Restore release keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > "$RUNNER_TEMP/release.jks"
          cat > keystore.properties <<EOF
          storeFile=$RUNNER_TEMP/release.jks
          storePassword=${{ secrets.KEYSTORE_PASSWORD }}
          keyAlias=${{ secrets.KEY_ALIAS }}
          keyPassword=${{ secrets.KEY_PASSWORD }}
          EOF

      - name: Assemble release APKs
        run: |
          chmod +x gradlew
          ./gradlew :app:assembleRelease

      # Имя ассета обязано содержать ABI - AppUpdater выбирает APK по Build.SUPPORTED_ABIS
      - name: Collect APKs
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          mkdir -p dist
          for abi in arm64-v8a armeabi-v7a; do
            cp "app/build/outputs/apk/release/app-${abi}-release.apk" "dist/freeturn-${VERSION}-${abi}.apk"
          done

      - name: Upload assets to GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload "$GITHUB_REF_NAME" dist/*.apk --clobber

  notify-telegram:
    name: Telegram announce
    runs-on: ubuntu-latest
    needs: build-and-publish
    steps:
      - name: Send release message
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          BODY=$(gh release view "$GITHUB_REF_NAME" --repo "$GITHUB_REPOSITORY" --json body -q .body | head -c 3000)
          URL=$(gh release view "$GITHUB_REF_NAME" --repo "$GITHUB_REPOSITORY" --json url -q .url)
          # GH-markdown -> Telegram-HTML: сначала экранируем HTML, потом размечаем.
          # Хвосты "by @user in <PR-url>" из авто-нотов убираем - в посте это шум.
          HTML=$(printf '%s' "$BODY" \
            | sed 's/&/\&amp;/g; s/</\&lt;/g; s/>/\&gt;/g' \
            | sed -E \
                -e 's| by @[[:alnum:]_-]+ in https://[^[:space:]]+||g' \
                -e 's|\[([^]]+)\]\((https?://[^)]+)\)|<a href="\2">\1</a>|g' \
                -e 's|\*\*([^*]+)\*\*|<b>\1</b>|g' \
                -e 's|`([^`]+)`|<code>\1</code>|g' \
                -e 's|^#{1,6}[[:space:]]+(.*)$|<b>\1</b>|' \
                -e 's|^[-*][[:space:]]+|• |')
          TEXT=$(printf '🚀 <b>FreeTurn %s</b>\n\n%s\n\n<a href="%s">Релиз на GitHub</a>' "$GITHUB_REF_NAME" "$HTML" "$URL")
          send() {
            curl -fsS -X POST "https://api.telegram.org/bot${BOT_TOKEN}/sendMessage" \
              --data-urlencode "chat_id=${CHAT_ID}" \
              --data-urlencode "text=$1" \
              --data-urlencode "parse_mode=${2:-}" \
              --data-urlencode "disable_web_page_preview=true" \
              -o /dev/null
          }
          # Кривой HTML роняет весь sendMessage - фолбэк plain text, чтобы анонс не пропал
          send "$TEXT" HTML || send "$(printf '🚀 FreeTurn %s\n\n%s\n\n%s' "$GITHUB_REF_NAME" "$BODY" "$URL")"
